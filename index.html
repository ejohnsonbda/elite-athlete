<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bermuda Sports Portal — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }

    /* ===== VIDEO BACKGROUND ===== */
    .login-screen {
      position: relative; width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    .login-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(135deg, rgba(233,30,140,0.40) 0%, rgba(25,25,112,0.40) 100%);
    }

    /* ===== LOGIN CARD ===== */
    .login-box {
      position: relative; z-index: 2;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }
    .login-box h1 {
      color: #fff; font-size: 1.6rem; font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 4px;
    }
    .login-box .subtitle {
      color: rgba(255,255,255,0.75); font-size: 0.88rem; margin-bottom: 28px;
    }
    .login-label {
      display: block; text-align: left;
      color: rgba(255,255,255,0.85); font-size: 0.82rem;
      font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .login-input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px; color: #fff;
      font-size: 1rem; outline: none;
      transition: border 0.2s, background 0.2s;
      margin-bottom: 16px;
    }
    .login-input::placeholder { color: rgba(255,255,255,0.45); }
    .login-input:focus {
      border-color: #E91E63;
      background: rgba(255,255,255,0.25);
    }
    .login-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #E91E63 0%, #C2185B 100%);
      border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .login-btn:hover { opacity: 0.92; }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      color: #ff8a80; font-size: 0.84rem;
      margin-top: 12px; min-height: 20px;
    }
    .login-footer {
      color: rgba(255,255,255,0.45); font-size: 0.75rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="login-screen">
    <video class="login-video" autoplay muted loop playsinline>
      <source src="login-bg.mp4" type="video/mp4" />
    </video>
    <div class="login-overlay"></div>
    <div class="login-box">
      <h1>Bermuda Sports Portal</h1>
      <p class="subtitle">2026 Applications Dashboard</p>
      <label class="login-label" for="codeInput">Access Code</label>
      <input class="login-input" id="codeInput" type="password"
             placeholder="Enter your access code"
             onkeydown="if(event.key==='Enter') attemptLogin()" />
      <button class="login-btn" id="loginBtn" onclick="attemptLogin()">Sign In</button>
      <div class="login-error" id="loginError"></div>
      <div class="login-footer">Bermuda Department of Youth, Sport &amp; Recreation</div>
    </div>
  </div>

  <script>
    const ACCESS_CODES = ['juren', 'safehands'];

    function normaliseCode(c) {
      return (c || '').trim().toLowerCase();
    }

    function attemptLogin() {
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      const raw = document.getElementById('codeInput').value;
      const code = normaliseCode(raw);

      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        if (ACCESS_CODES.includes(code)) {
          sessionStorage.setItem('portal_auth', '1');
          sessionStorage.setItem('portal_code', code);
          window.location.href = 'portal.html';
        } else {
          errEl.textContent = 'Invalid access code. Please try again.';
          document.getElementById('codeInput').value = '';
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Auto-restore session
    (function initSession() {
      const auth = sessionStorage.getItem('portal_auth');
      const code = normaliseCode(sessionStorage.getItem('portal_code'));
      if (auth === '1' && ACCESS_CODES.includes(code)) {
        window.location.href = 'portal.html';
      }
    })();
  </script>
</body>
</html>
